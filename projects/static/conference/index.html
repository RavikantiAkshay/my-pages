<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Conference - Static Project</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Robust Toggle Overrides -->
    <script>
        function display(sectionId) {
            const sections = ['sectionConferencehomepage', 'sectionConferencedetailspage'];
            sections.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.setProperty('display', 'none', 'important');
            });
            const target = document.getElementById(sectionId);
            if (target) {
                target.style.setProperty('display', 'block', 'important');
            }
        }
        window.display = display;
    </script>
</head>
<body>
    <div id="sectionConferencehomepage">
        <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/conference-img.png" class="conference-image" alt="Conference Home"/>
        <div class="conference-text-container">
            <h1 class="conference-main-heading">The Things</h1>
            <h1 class="conference-main-heading">Conference</h1>
            <p class="conference-description">Redefining the future of IoT with LoRaWAN</p>
            <button class="btn btn-primary know-more-btn" onclick="display('sectionConferencedetailspage')">Know more</button>
        </div>
    </div>
    <div id="sectionConferencedetailspage" style="display: none;">
        <div class="embed-responsive embed-responsive-16by9">
            <iframe class="embed-responsive-item conference-video" src="https://www.youtube.com/embed/W_2hCKnzWj0" allowfullscreen></iframe>
        </div>
        <div class="details-text-container">
            <h1 class="details-main-heading">The Things Conference</h1>
            <p class="details-description">Join Asia's Largest Conference on LoRaWAN</p>
            <div class="details-card-container d-flex flex-row justify-content-center">
                <div class="details-card d-flex flex-column">
                    <p class="top-one">1400+</p>
                    <p class="bottom-one">Attendees</p>
                </div>
                <div class="details-card d-flex flex-column">
                    <p class="top-one">100+</p>
                    <p class="bottom-one">Workshops</p>
                </div>
            </div>
            <div class="details-card-container d-flex flex-row justify-content-center">
                <div class="details-card d-flex flex-column">
                    <p class="top-one">120+</p>
                    <p class="bottom-one">Speakers</p>
                </div>
                <div class="details-card d-flex flex-column">
                    <p class="top-one">10+</p>
                    <p class="bottom-one">Countries</p>
                </div>
            </div>
            <button class="btn btn-primary back-btn" onclick="display('sectionConferencehomepage')">Back</button>
        </div>
    </div>

    <!-- UI Kit Script -->
    <script type="text/javascript" src="https://new-assets.ccbp.in/frontend/content/static-ccbp-ui-kit/static-ccbp-ui-kit.js"></script>
    <!-- Universal Display Script -->
    <script>
        window.display = function(sectionId) {
            // Force hide all sections starting with 'section'
            const allSections = document.querySelectorAll('[id^="section"]');
            allSections.forEach(s => s.style.setProperty('display', 'none', 'important'));
            
            // Show the requested section
            const target = document.getElementById(sectionId);
            if (target) {
                target.style.setProperty('display', 'block', 'important');
            }
        };
    </script>
    <!-- Bootstrap JS dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</body>
</html>
